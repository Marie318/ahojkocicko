<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kočičí Věštírna</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <svg class="sigil" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <linearGradient id="g" x1="0%" x2="100%" y1="0%" y2="100%">
                    <stop offset="0%" stop-color="#ff2d7a" stop-opacity="1" />
                    <stop offset="100%" stop-color="#ff004f" stop-opacity="1" />
                </linearGradient>
            </defs>
            <g fill="none" stroke="url(#g)" stroke-width="2">
                <circle cx="100" cy="100" r="72" />
                <polygon points="100,28 140,150 60,150" />
                <circle cx="100" cy="100" r="40" stroke-opacity="0.5" />
                <path d="M60 120 L140 80" stroke-opacity="0.35" />
                <path d="M60 80 L140 120" stroke-opacity="0.35" />
            </g>
        </svg>
        <div class="devil-figure" aria-hidden="true">
            <img src="Gemini_Generated_Image_1uq6mq1uq6mq1uq6.png" alt="Foto satana" />
        </div>
        <h1>Pekelná Kočičí Věštírna</h1>
        
        <p class="subtitle">Vítej v plamenech — tady ti kočka-satan zašeptá pravdu.</p>
        
        <div class="fortune-display">
            <div class="fortune-text">
                <span id="fortune" class="fortune-empty">Klikni a kočka ti zašeptá vtip! 😸</span>
            </div>
        </div>

        <button onclick="getCatFortune()">🎱 Ptej se pekelné kočky 🎱</button>

        <div class="viewer-wrap">
            <model-viewer id="viewer" src="models/devil.glb" alt="3D pekelný satanský model" camera-controls auto-rotate exposure="1" shadow-intensity="1" style="--poster-color: #000000;">
                <button slot="ar-button" class="control-btn">Zobrazit v AR</button>
            </model-viewer>

            <div class="uploader">
                <label class="control-btn">Nahrát GLB
                    <input id="modelFile" type="file" accept="model/gltf-binary,model/gltf+json,.glb,.gltf" style="display:none">
                </label>
                <label class="control-btn">Nahrát obrázek
                    <input id="imageFile" type="file" accept="image/*" style="display:none">
                </label>
                <label class="control-btn">Nahrát zvuk
                    <input id="audioFile" type="file" accept="audio/*" style="display:none">
                </label>
                <button id="resetViewer" class="control-btn">Obnovit</button>
            </div>
            <div class="audio-status" id="audioStatus">Žádný zvuk není nahraný.</div>
            <div style="font-size:0.85em;color:rgba(255,180,190,0.9);margin-top:8px">Tip: Nahraj vlastní `.glb` pro fotorealistický model, obrázek jako fallback nebo audio pro hlas satana.</div>
            <div id="viewerMessage" style="margin-top:8px;color:rgba(255,150,160,0.95);"></div>
        </div>

        <div class="paw-print">🐾</div>

        <div class="stars">✨ ✨ ✨</div>

        <div class="colors-info">
            🔥 Pekelné tóny: červená · černá · popel
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
